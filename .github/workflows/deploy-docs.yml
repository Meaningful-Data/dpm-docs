name: Deploy docs

on:
  push:
    branches:
      - master
    tags:
      - "v*"

# Allow the workflow to push to the gh-pages branch.
permissions:
  contents: write

# Avoid concurrent deploys racing on the gh-pages branch.
concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so mike can read/update the gh-pages branch.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Make sure the local gh-pages branch tracks the remote one.
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy released version (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest

      - name: Deploy development version (master)
        if: github.ref == 'refs/heads/master'
        run: mike deploy --push dev
